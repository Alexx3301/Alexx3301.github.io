<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Драйвер-мания: выбери правильный сайт для драйверов</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0f172a 0%, #0a0f1c 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            max-width: 1200px;
            width: 100%;
            background: rgba(15, 25, 45, 0.8);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .game-header {
            text-align: center;
            margin-bottom: 1.8rem;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #e0f0ff, #3b82f6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 0;
            letter-spacing: -0.3px;
        }

        .sub {
            color: #94a3d8;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        .stats-panel {
            display: flex;
            justify-content: space-between;
            background: #0b1120aa;
            padding: 0.6rem 1.8rem;
            border-radius: 60px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 12px;
        }

        .stat {
            background: #010a1aaa;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: bold;
            color: #cbd5ff;
        }

        .stat span {
            color: #facc15;
            font-size: 1.5rem;
            font-weight: 800;
            margin-left: 8px;
        }

        /* карточка компонента */
        .component-card {
            background: linear-gradient(145deg, #111827, #0b0f1c);
            border-radius: 2rem;
            padding: 1.8rem;
            text-align: center;
            margin-bottom: 2rem;
            border: 1px solid #2d3a60;
            box-shadow: 0 12px 24px -12px black;
        }

        .component-icon {
            font-size: 3.5rem;
            filter: drop-shadow(0 4px 6px #00000044);
        }

        .component-name {
            font-size: 1.9rem;
            font-weight: 800;
            color: #eef2ff;
            margin: 12px 0 8px;
        }

        .component-desc {
            color: #9bb0e0;
            font-size: 0.9rem;
            max-width: 500px;
            margin: 0 auto;
        }

        /* варианты ответов (сайты) */
        .sites-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            justify-content: center;
            margin: 1.5rem 0 1.2rem;
        }

        .site-btn {
            background: #1e293b;
            border: 2px solid #334155;
            padding: 14px 24px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .site-btn:hover {
            background: #2d3b5a;
            border-color: #5f8eff;
            transform: scale(1.02);
        }

        .site-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .feedback {
            text-align: center;
            padding: 14px;
            border-radius: 50px;
            font-weight: 500;
            margin: 20px 0;
            font-size: 1rem;
        }

        .feedback.correct {
            background: #0a4d2eb3;
            color: #c6ffdd;
            border-left: 6px solid #2ecc71;
        }

        .feedback.wrong {
            background: #7a2626b3;
            color: #ffcfcf;
            border-left: 6px solid #e74c3c;
        }

        .next-btn {
            background: #3b4b7a;
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 1.1rem;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            width: 240px;
            margin: 5px auto;
            display: block;
        }

        .next-btn:disabled {
            opacity: 0.4;
            cursor: default;
        }

        .restart-btn {
            background: #2f3b5c;
            padding: 8px 28px;
            font-size: 0.9rem;
            width: auto;
            display: inline-block;
            margin-top: 0;
        }

        .footer-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        @media (max-width: 680px) {
            .site-btn {
                min-width: 100%;
            }
            .component-name {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <h1>🖱️ ГДЕ КАЧАТЬ ДРАЙВЕР?</h1>
        <div class="sub">Выбери официальный сайт производителя для этого компонента</div>
    </div>

    <div class="stats-panel">
        <div class="stat">🏆 СЧЕТ: <span id="scoreValue">0</span></div>
        <div class="stat">📋 ВОПРОС: <span id="qCurrent">1</span> / <span id="qTotal">10</span></div>
        <div class="stat">🔥 СЕРИЯ: <span id="streakValue">0</span></div>
    </div>

    <!-- компонент -->
    <div class="component-card">
        <div class="component-icon" id="componentIcon">🖥️</div>
        <div class="component-name" id="componentName">Загрузка...</div>
        <div class="component-desc" id="componentDesc">Укажи, с какого сайта нужно скачать драйвер для этого устройства</div>
    </div>

    <!-- кнопки сайтов -->
    <div class="sites-grid" id="sitesContainer"></div>

    <div class="feedback" id="feedbackMsg">Выбери один из вариантов. Официальный сайт производителя — залог безопасности!</div>

    <div class="footer-buttons">
        <button class="next-btn" id="nextBtn" disabled>➡ СЛЕДУЮЩИЙ КОМПОНЕНТ</button>
        <button class="next-btn restart-btn" id="restartBtn">🔄 НАЧАТЬ ЗАНОВО</button>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // БАЗА ДАННЫХ: комплектующие и сайты для драйверов (официальные ресурсы)
    // --------------------------------------------------------------
    const componentsDB = [
        {
            id: "nvidia_gpu",
            name: "Видеокарта NVIDIA GeForce RTX",
            icon: "🎮",
            description: "Игровая видеокарта, требует драйвер Game Ready или Studio",
            correctSite: "nvidia.com",
            siteDisplay: "nvidia.com (официальный сайт NVIDIA)"
        },
        {
            id: "amd_gpu",
            name: "Видеокарта AMD Radeon RX",
            icon: "🎮",
            description: "AMD Radeon, драйвер Adrenalin",
            correctSite: "amd.com",
            siteDisplay: "amd.com (AMD Support)"
        },
        {
            id: "intel_cpu",
            name: "Процессор Intel Core",
            icon: "⚙️",
            description: "Центральный процессор Intel, нужен драйвер чипсета / графики (iGPU)",
            correctSite: "intel.com",
            siteDisplay: "intel.com (Центр загрузок Intel)"
        },
        {
            id: "amd_cpu",
            name: "Процессор AMD Ryzen",
            icon: "⚙️",
            description: "AMD Ryzen, требуется драйвер чипсета и энергопрофили",
            correctSite: "amd.com",
            siteDisplay: "amd.com (AMD Drivers & Support)"
        },
        {
            id: "realtek_audio",
            name: "Звуковая карта Realtek HD Audio",
            icon: "🔊",
            description: "Встроенный аудиокодек на материнской плате",
            correctSite: "realtek.com",
            siteDisplay: "realtek.com (Realtek Semiconductor)"
        },
        {
            id: "intel_lan",
            name: "Сетевой контроллер Intel Ethernet",
            icon: "🌐",
            description: "LAN (гигабитный Ethernet) от Intel",
            correctSite: "intel.com",
            siteDisplay: "intel.com (LAN драйверы Intel)"
        },
        {
            id: "killer_wifi",
            name: "Wi-Fi/Bluetooth адаптер Killer",
            icon: "📶",
            description: "Беспроводной модуль Killer Wireless",
            correctSite: "intel.com",
            siteDisplay: "intel.com (Killer по лицензии Intel)"
        },
        {
            id: "msi_motherboard",
            name: "Материнская плата MSI",
            icon: "🧩",
            description: "Материнская плата MSI (чипсет, аудио, LAN, утилиты)",
            correctSite: "msi.com",
            siteDisplay: "msi.com (MSI Global)"
        },
        {
            id: "asus_motherboard",
            name: "Материнская плата ASUS",
            icon: "🧩",
            description: "ASUS主板 — драйверы чипсета, Armoury Crate, LAN",
            correctSite: "asus.com",
            siteDisplay: "asus.com (ASUS Support)"
        },
        {
            id: "gigabyte_motherboard",
            name: "Материнская плата GIGABYTE",
            icon: "🧩",
            description: "GIGABYTE / Aorus – необходимо скачать драйверы с официального портала",
            correctSite: "gigabyte.com",
            siteDisplay: "gigabyte.com (GIGABYTE Service)"
        },
        {
            id: "logitech_mouse",
            name: "Мышь Logitech G",
            icon: "🖱️",
            description: "Игровая мышь, требуется G HUB или драйвер кнопок",
            correctSite: "logitech.com",
            siteDisplay: "logitech.com (Logitech Support)"
        },
        {
            id: "samsung_ssd",
            name: "SSD Samsung (NVMe / SATA)",
            icon: "💾",
            description: "Твердотельный накопитель Samsung, драйвер и утилита Samsung Magician",
            correctSite: "samsung.com",
            siteDisplay: "samsung.com (Samsung Semiconductor)"
        },
        {
            id: "wd_ssd",
            name: "Накопитель Western Digital / SanDisk",
            icon: "💾",
            description: "SSD / HDD WD, инструмент Dashboard и драйверы",
            correctSite: "westerndigital.com",
            siteDisplay: "westerndigital.com (WD Support)"
        },
        {
            id: "corsair_psu",
            name: "Блок питания Corsair (iCUE Link / PSU)",
            icon: "🔌",
            description: "Цифровой БП с возможностью мониторинга через iCUE",
            correctSite: "corsair.com",
            siteDisplay: "corsair.com (Corsair Downloads)"
        },
        {
            id: "razer_periph",
            name: "Периферия Razer (клавиатура/мышь)",
            icon: "⌨️",
            description: "Razer Synapse необходим для настройки макросов и подсветки",
            correctSite: "razer.com",
            siteDisplay: "razer.com (Razer Support)"
        }
    ];

    // Сайты-ловушки (популярные неправильные варианты)
    const trapSites = [
        { id: "driver-ru", name: "driver.ru / driver.ru.net (сомнительный сайт)", display: "driver.ru (неофициальный)" },
        { id: "softportal", name: "SoftPortal / SoftSalad (агрегатор)", display: "softportal.com (сторонний сборник)" },
        { id: "driverpack", name: "DriverPack Solution / Driver Booster", display: "driverpack.io (автоустановщик)" },
        { id: "filehippo", name: "FileHippo (устаревшие драйверы)", display: "filehippo.com (неофициальный)" },
        { id: "cnet", name: "CNET Downloads (небезопасно)", display: "download.cnet.com (сторонний)" },
        { id: "microsoft_update", name: "Центр обновлений Windows (не всегда свежие драйверы)", display: "windows update (базовый, но не производитель)" }
    ];

    // Игровые переменные
    let gameQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let currentStreak = 0;
    let answered = false;
    let currentQuestion = null;
    let totalQ = 0;

    // DOM элементы
    const componentIconEl = document.getElementById("componentIcon");
    const componentNameEl = document.getElementById("componentName");
    const componentDescEl = document.getElementById("componentDesc");
    const sitesContainer = document.getElementById("sitesContainer");
    const feedbackMsgDiv = document.getElementById("feedbackMsg");
    const nextBtn = document.getElementById("nextBtn");
    const restartBtn = document.getElementById("restartBtn");
    const scoreSpan = document.getElementById("scoreValue");
    const qCurrentSpan = document.getElementById("qCurrent");
    const qTotalSpan = document.getElementById("qTotal");
    const streakSpan = document.getElementById("streakValue");

    // Перемешивание массива (Фишер-Йетс)
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Генерация вопросов: для каждого компонента формируем 1 вопрос с 4 вариантами ответов (один правильный сайт, 3 ловушки)
    function prepareGame() {
        // берем 10-12 разных компонентов для разнообразия
        let selectedComponents = shuffleArray([...componentsDB]).slice(0, 12);
        gameQuestions = [];
        for (let comp of selectedComponents) {
            // определим правильный сайт-объект для этого компонента
            let correctSiteObj = null;
            if (comp.correctSite === "nvidia.com") correctSiteObj = { id: "nvidia", name: "nvidia.com (NVIDIA официальный)", display: "nvidia.com — официальный сайт NVIDIA" };
            else if (comp.correctSite === "amd.com") correctSiteObj = { id: "amd", name: "amd.com (AMD Drivers)", display: "amd.com — поддержка AMD" };
            else if (comp.correctSite === "intel.com") correctSiteObj = { id: "intel", name: "intel.com (Intel Download Center)", display: "intel.com — официальные драйверы Intel" };
            else if (comp.correctSite === "realtek.com") correctSiteObj = { id: "realtek", name: "realtek.com (Realtek)", display: "realtek.com — аудио/LAN драйверы" };
            else if (comp.correctSite === "msi.com") correctSiteObj = { id: "msi", name: "msi.com (MSI Global)", display: "msi.com — поддержка MSI" };
            else if (comp.correctSite === "asus.com") correctSiteObj = { id: "asus", name: "asus.com (ASUS Support)", display: "asus.com — официальные драйверы ASUS" };
            else if (comp.correctSite === "gigabyte.com") correctSiteObj = { id: "gigabyte", name: "gigabyte.com (GIGABYTE)", display: "gigabyte.com — загрузки GIGABYTE" };
            else if (comp.correctSite === "logitech.com") correctSiteObj = { id: "logitech", name: "logitech.com (Logitech Support)", display: "logitech.com — официальный софт Logitech" };
            else if (comp.correctSite === "samsung.com") correctSiteObj = { id: "samsung", name: "samsung.com (Samsung SSD/Magician)", display: "samsung.com — драйверы для SSD" };
            else if (comp.correctSite === "westerndigital.com") correctSiteObj = { id: "wd", name: "westerndigital.com (WD Support)", display: "westerndigital.com — официальные драйверы WD" };
            else if (comp.correctSite === "corsair.com") correctSiteObj = { id: "corsair", name: "corsair.com (Corsair)", display: "corsair.com — iCUE и драйверы" };
            else if (comp.correctSite === "razer.com") correctSiteObj = { id: "razer", name: "razer.com (Razer Support)", display: "razer.com — Razer Synapse" };
            else {
                // fallback (обычно не нужно, но на всякий)
                correctSiteObj = { id: "official", name: comp.correctSite, display: comp.correctSite };
            }

            // подбираем 3 разных ловушки (не повторяющихся и не совпадающих с правильным)
            let availableTraps = trapSites.filter(trap => trap.display !== correctSiteObj.display);
            let selectedTraps = shuffleArray([...availableTraps]).slice(0, 3);
            let options = [correctSiteObj, ...selectedTraps];
            options = shuffleArray(options); // перемешиваем порядок

            gameQuestions.push({
                component: comp,
                correctSiteId: correctSiteObj.id,
                options: options,
                explanation: `Правильный выбор: ${correctSiteObj.name}. Только с официального сайта производителя (${comp.correctSite}) вы получите безопасные и актуальные драйверы.`
            });
        }
        totalQ = gameQuestions.length;
        qTotalSpan.innerText = totalQ;
    }

    function renderCurrentQuestion() {
        if (!gameQuestions.length || currentIndex >= gameQuestions.length) return;
        answered = false;
        currentQuestion = gameQuestions[currentIndex];
        const comp = currentQuestion.component;
        componentIconEl.innerText = comp.icon || "🔧";
        componentNameEl.innerText = comp.name;
        componentDescEl.innerText = comp.description;

        // отрисовка кнопок вариантов
        sitesContainer.innerHTML = "";
        currentQuestion.options.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "site-btn";
            btn.innerText = opt.display || opt.name;
            btn.dataset.siteId = opt.id;
            btn.addEventListener("click", () => handleAnswer(opt.id, btn));
            sitesContainer.appendChild(btn);
        });

        feedbackMsgDiv.innerHTML = "🤔 Где безопаснее всего скачать драйвер для этого устройства?";
        feedbackMsgDiv.className = "feedback";
        nextBtn.disabled = true;

        // активируем все кнопки
        document.querySelectorAll(".site-btn").forEach(btn => {
            btn.disabled = false;
        });
    }

    function handleAnswer(selectedSiteId, btnElement) {
        if (answered) {
            feedbackMsgDiv.innerHTML = "⚠️ Ответ уже дан. Нажми 'Следующий компонент'.";
            return;
        }
        const isCorrect = (selectedSiteId === currentQuestion.correctSiteId);
        let pointsEarned = 0;

        if (isCorrect) {
            currentStreak++;
            pointsEarned = 10 + Math.min(10, Math.floor(currentStreak / 2) * 2);
            if (currentStreak >= 3) pointsEarned += 5;
            score += pointsEarned;
            feedbackMsgDiv.innerHTML = `✅ Верно! +${pointsEarned} очков. ${currentQuestion.explanation} Серия: ${currentStreak}`;
            feedbackMsgDiv.className = "feedback correct";
        } else {
            // найти правильный вариант для отображения
            const correctOpt = currentQuestion.options.find(opt => opt.id === currentQuestion.correctSiteId);
            currentStreak = 0;
            feedbackMsgDiv.innerHTML = `❌ Неверно. ${currentQuestion.explanation} Лучше скачивать драйверы только с официального сайта (${correctOpt?.display || correctOpt?.name}). Серия сброшена.`;
            feedbackMsgDiv.className = "feedback wrong";
        }

        scoreSpan.innerText = score;
        streakSpan.innerText = currentStreak;
        answered = true;

        // блокируем все кнопки
        document.querySelectorAll(".site-btn").forEach(btn => {
            btn.disabled = true;
        });
        nextBtn.disabled = false;
    }

    function nextQuestion() {
        if (!answered && currentIndex < gameQuestions.length) {
            feedbackMsgDiv.innerHTML = "⚠️ Сначала ответь на текущий вопрос!";
            return;
        }
        if (currentIndex + 1 < gameQuestions.length) {
            currentIndex++;
            renderCurrentQuestion();
            updateStatsDisplay();
        } else {
            feedbackMsgDiv.innerHTML = `🏆 Поздравляем! Игра пройдена. Итоговый счёт: ${score} из ~${totalQ * 15}. Теперь ты знаешь, где искать драйверы! 💾`;
            feedbackMsgDiv.className = "feedback correct";
            nextBtn.disabled = true;
            document.querySelectorAll(".site-btn").forEach(btn => btn.disabled = true);
        }
        updateStatsDisplay();
    }

    function updateStatsDisplay() {
        qCurrentSpan.innerText = currentIndex + 1;
        qTotalSpan.innerText = totalQ;
        scoreSpan.innerText = score;
        streakSpan.innerText = currentStreak;
    }

    function restartGame() {
        prepareGame();
        currentIndex = 0;
        score = 0;
        currentStreak = 0;
        answered = false;
        updateStatsDisplay();
        renderCurrentQuestion();
        nextBtn.disabled = true;
        feedbackMsgDiv.innerHTML = "🔄 Новая игра! Выбирай официальный сайт производителя.";
        feedbackMsgDiv.className = "feedback";
    }

    // инициализация
    prepareGame();
    renderCurrentQuestion();
    updateStatsDisplay();

    nextBtn.addEventListener("click", nextQuestion);
    restartBtn.addEventListener("click", restartGame);
</script>
</body>
</html>
